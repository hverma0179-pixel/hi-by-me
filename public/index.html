<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Harvis AI is a lightweight Gemini voice assistant website with chat and browser speech."
    />
    <title>Harvis AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-label="Harvis AI assistant">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1>Harvis AI</h1>
              <p>Real-time Gemini Voice Assistant</p>
            </div>
          </div>

          <div class="status-badge" id="statusBadge">
            <span aria-hidden="true"></span>
            Online
          </div>
        </header>

        <div class="orb-stage" aria-live="polite">
          <div class="orb idle" id="aiOrb" aria-hidden="true">
            <div class="orb-core"></div>
            <div class="orb-ring"></div>
            <div class="orb-wave"></div>
          </div>
          <p id="stateText">Ready for your command.</p>
        </div>

        <div class="controls">
          <button class="control-button primary" id="micButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z"></path>
              <path d="M19 11a7 7 0 0 1-14 0"></path>
              <path d="M12 18v3"></path>
              <path d="M8 21h8"></path>
            </svg>
            Speak
          </button>

          <button class="control-button" id="stopButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 8h8v8H8z"></path>
            </svg>
            Stop
          </button>

          <button class="control-button" id="clearButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
            Clear
          </button>
        </div>

        <label class="voice-picker" for="voiceSelect">
          <span>Voice</span>
          <select id="voiceSelect" aria-label="Select assistant voice">
            <option value="">Loading voices...</option>
          </select>
        </label>
      </section>

      <section class="chat-panel" aria-label="Chat with Harvis">
        <div class="chat-header">
          <div>
            <h2>Conversation</h2>
            <p>No cookies. Memory is saved locally in JSON on the server.</p>
          </div>
        </div>

        <div class="quick-prompts" aria-label="Quick prompts">
          <button type="button">GTA 5 release date</button>
          <button type="button">Explain AI simply</button>
          <button type="button">Latest Minecraft version</button>
          <button type="button">Give me app idea</button>
        </div>

        <div class="messages" id="messages" aria-live="polite">
          <article class="message ai">
            <p>Hello, I am Harvis. Ask by voice or type below.</p>
          </article>
        </div>

        <form class="composer" id="chatForm">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Ask Harvis anything..."
            aria-label="Ask Harvis anything"
          />
          <button class="send-button" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2 11 13"></path>
              <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
